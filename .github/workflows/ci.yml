name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install pinned Rust toolchain
        run: rustup show
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run strict Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Run workspace tests
        run: cargo test --workspace --all-targets --all-features
      - name: Run doctests
        run: cargo test --workspace --doc
      - name: Deny Rustdoc warnings
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps
      - name: Check generated schemas
        run: cargo xtask schema --check
      - name: Build locked release artifacts
        run: cargo build --workspace --all-features --locked --release

  dependency-policy:
    name: Dependency policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install pinned Rust toolchain
        run: rustup show
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.20.2
      - name: Check advisories, licenses, bans, and sources
        run: cargo deny check
